<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment 07 - Product Card Component</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;padding:40px}
h1{text-align:center;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px}
.card{background:white;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08);padding:20px;transition:.3s}
.card:hover{transform:translateY(-5px)}
.img{height:120px;background:#e5e7eb;border-radius:12px;margin-bottom:15px}
.price{font-size:20px;font-weight:bold;margin:10px 0}
.status{display:inline-block;padding:8px 16px;border-radius:20px;font-size:14px}
.in{background:#d1fae5;color:#065f46}
.out{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<h1>Product Cards</h1>
<div class="grid" id="products"></div>
<script>
const products=[
{name:"Wireless Headphones",price:129.99,stock:true},
{name:"Mechanical Keyboard",price:89.99,stock:false},
{name:"Smart Watch",price:199.99,stock:true}
]

function ProductCard(product){
return `
<div class="card">
<div class="img"></div>
<h2>${product.name}</h2>
<div class="price">$${product.price}</div>
<span class="status ${product.stock ? "in":"out"}">
${product.stock ? "In Stock":"Out of Stock"}
</span>
</div>
`
}

const container=document.getElementById("products")
products.forEach(p=>{
container.innerHTML+=ProductCard(p)
})
</script>
</body>
</html>
